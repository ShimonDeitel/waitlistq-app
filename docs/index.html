<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Waitlist - Booking Queue</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#0d0d0d; color:#f2f2f2; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:40px 24px; }
  h1 { font-size:2.2rem; margin-bottom:8px; color:#2B8C82; }
  p.tag { font-size:1.1rem; color:#ccc; margin-bottom:32px; }
  .pill { display:inline-block; padding:10px 22px; border:1px solid #2B8C82; border-radius:999px; color:#2B8C82; text-decoration:none; margin:6px; }
  footer { margin-top:48px; font-size:0.85rem; color:#777; }
  a { color:#2B8C82; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #2B8C8255 0%, #2B8C8200 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Waitlist - Booking Queue</h1>
  <p class="tag">Keep an ordered waitlist of clients hoping for a cancellation slot.</p>
  <a class="pill" href="privacy.html">Privacy Policy</a>
  <a class="pill" href="terms.html">Terms of Use</a>
  <footer>Contact: s0533495227@gmail.com</footer>
</div>
</body>
</html>
